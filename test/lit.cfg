import os
import lit.formats

config.name = 'hermes-node'
config.test_format = lit.formats.ShTest(True)
config.suffixes = ['.js']
config.test_source_root = os.path.dirname(__file__)
config.test_exec_root = lit_config.params['test_exec_root']

# Substitutions (order matters: longer names first to avoid prefix matching)
hermes_node = lit_config.params['hermes_node']
source_dir = lit_config.params['source_dir']
config.substitutions.append(('%hermes-node', hermes_node))
config.substitutions.append(('%hermes', lit_config.params['hermes']))
config.substitutions.append(('%FileCheck', lit_config.params['FileCheck']))
config.substitutions.append(('%source_dir', source_dir))

config.excludes = []
